name: SEC Pipeline

on:
  schedule:
    # Run monthly on the 1st at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual run"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCS_BUCKET: ${{ secrets.GCS_RAW_BUCKET }}
  BQ_DATASET_RAW: sec_raw

jobs:
  pipeline:
    name: Run SEC Ingestion Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up Python ──
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. Set up Java (required for PySpark) ──
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      # ── 5. Install uv and dependencies ──
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      # ── 6. PySpark Ingestion (Phase 2) ──
      - name: Run PySpark ingestion
        run: |
          echo "Phase 2 — PySpark ingestion not yet implemented"
          # python spark/ingest_sec_form4.py

      # ── 7. Great Expectations validation (Phase 4) ──
      - name: Run data quality checks
        run: |
          echo "Phase 4 — Great Expectations not yet implemented"
          # great_expectations checkpoint run sec_raw_checkpoint

      # ── 8. dbt run (Phase 3) ──
      - name: Run dbt models
        run: |
          echo "Phase 3 — dbt not yet implemented"
          # cd dbt && dbt run && dbt test

      # ── 9. Notify on failure ──
      - name: Notify Slack on failure
        if: failure()
        run: |
          echo "Pipeline failed — Slack notification not yet configured"
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"SEC Pipeline FAILED on ${{ github.run_id }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
