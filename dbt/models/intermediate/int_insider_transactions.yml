version: 2

models:
  - name: int_insider_transactions
    description: >
      Deduplicated and enriched insider transactions. Amendments (4/A) supersede
      originals. Time dimensions and derived fields added for mart aggregation.

    columns:
      - name: accession_number
        description: "Unique filing ID — deduplicated"
        tests:
          - not_null:
              config:
                severity: warn

      - name: transaction_year
        description: "Year of transaction"

      - name: transaction_month_key
        description: "YYYY-MM formatted month key for time series"

      - name: days_to_file
        description: "Days between transaction date and SEC filing date (late filers > 2)"
