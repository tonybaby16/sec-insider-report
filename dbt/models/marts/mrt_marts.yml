version: 2

models:
  - name: mrt_monthly_insider_activity
    description: >
      Monthly insider trading activity aggregated by company ticker and month.
      One row per ticker + month + buy_sell_flag combination.

    columns:
      - name: transaction_month_key
        description: "YYYY-MM month key"
        tests:
          - not_null

      - name: issuer_ticker
        description: "Stock ticker"
        tests:
          - not_null

      - name: buy_sell_flag
        description: "Buy or Sell"
        tests:
          - not_null
          - accepted_values:
              values: ["Buy", "Sell"]

      - name: total_value_usd
        description: "Total USD value of transactions in the month"

      - name: num_unique_insiders
        description: "Count of distinct insiders trading in the month"
        tests:
          - not_null

  - name: mrt_top_insider_traders
    description: >
      Aggregated view of insider trading activity per insider per company.
      Ranked by total transaction value.

    columns:
      - name: insider_name
        description: "Insider full name"
        tests:
          - not_null

      - name: issuer_ticker
        description: "Company ticker"
        tests:
          - not_null

      - name: rank_by_value
        description: "Rank within buy or sell group by total USD value"
        tests:
          - not_null

  - name: mrt_company_insider_sentiment
    description: >
      Company-level insider sentiment scores. Buy ratio, net value,
      and sentiment label for Streamlit heatmap and ranking views.

    columns:
      - name: issuer_ticker
        tests:
          - not_null
          - unique

      - name: buy_ratio
        description: "0.0 to 1.0 — proportion of transactions that are buys"

      - name: sentiment_label
        tests:
          - not_null
          - accepted_values:
              values:
                [
                  "Strong Buy Signal",
                  "Moderate Buy Signal",
                  "Moderate Sell Signal",
                  "Strong Sell Signal",
                ]

      - name: net_value_usd
        description: "Total buy value minus total sell value in USD"
        tests:
          - not_null
