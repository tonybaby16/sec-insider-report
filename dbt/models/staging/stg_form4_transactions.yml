version: 2

models:
  - name: stg_form4_transactions
    description: >
      Cleaned Form 4 transactions. One row per non-derivative transaction.
      Columns are renamed, cast, and standardised. Flags converted to booleans.

    columns:
      - name: accession_number
        description: "Unique SEC filing ID"
        tests:
          - not_null

      - name: cik
        description: "SEC filer Central Index Key"
        tests:
          - not_null

      - name: issuer_ticker
        description: "Uppercased stock ticker symbol"

      - name: insider_name
        description: "Reporting owner full name (title-cased)"
        tests:
          - not_null

      - name: transaction_code
        description: "Standardised transaction code"
        tests:
          - not_null
          - accepted_values:
              values:
                [
                  "S",
                  "P",
                  "M",
                  "G",
                  "F",
                  "A",
                  "C",
                  "D",
                  "E",
                  "H",
                  "I",
                  "J",
                  "K",
                  "L",
                  "O",
                  "U",
                  "W",
                  "X",
                  "Z",
                ]

      - name: transaction_date
        description: "Date of the transaction"
        tests:
          - not_null

      - name: buy_sell_flag
        description: "Simplified Buy/Sell/Exercise/Gift/Other classification"
        tests:
          - not_null
          - accepted_values:
              values: ["Buy", "Sell", "Exercise", "Gift", "Other"]

      - name: insider_role
        description: "Derived insider role classification"
        tests:
          - not_null
          - accepted_values:
              values: ["Officer", "Director", "10% Owner", "Other"]

      - name: ownership_type
        description: "Direct or Indirect ownership"
        tests:
          - accepted_values:
              values: ["Direct", "Indirect", "D", "I", null]
