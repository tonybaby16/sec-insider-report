sec_insider_pipeline:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: oauth # uses GOOGLE_APPLICATION_CREDENTIALS or ADC
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: sec_staging # default dataset (overridden per model via +schema)
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive
